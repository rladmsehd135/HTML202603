<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 600px;
            height: 400px;

        }
        .grad1{
            /*선형 그라데이션*/
            background: blue; /*그라데이션을 지원안하는 환경에서 보이는 색*/
            background: linear-gradient(to right bottom, blue,white);

        }
        .grad2{
            background: blue; /*그라데이션을 지원안하는 환경에서 보이는 색*/
            background: linear-gradient(90deg, blue ,rgb(129, 110, 184) ,white );
        }
        .grad3{
            background: blue; /*그라데이션을 지원안하는 환경에서 보이는 색*/
            background: linear-gradient(90deg, blue 10%,rgb(129, 110, 184) 70%,white 100%);
        }
    </style>
</head>
<body>
    <div class="grad3"></div>
</body>
</html>
