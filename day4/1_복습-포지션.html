<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 150px;
            height: 150px;
            border: 2px solid black;
            margin-top: 5px;

        }
        .box1{
            background-color: aqua;
        }
        .box2{
            background-color: beige;
            position: relative;
            top: 20px;
            left:50px;
        }
        .box3{
            background-color: blueviolet;
            position: fixed;
            top: 30px;
            right: 50px;

        }
        
        .box4{
            background-color: blue;
            position: absolute;
            top: 50px;
            left: 50px;

        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <br><br>
    <hr>
    <div class ="box4"></div>
    <div style="width: 500px; height: 500px; position: relative;">
        <div class ="box4"></div>
    </div>
    <div style = "margin-top: 1000px;"></div>
</body>
</html>
