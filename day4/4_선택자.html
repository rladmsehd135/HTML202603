<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            color:blue;

        }
        div, span{ /*div,span 둘다 죽용*/
            font-size: 15px;
        }
        div span{ /*div 모든 하위 요소 span태그에 적용*/
            font-weight: bold;
        }

        div > span{ /*div자식요소 span태그에 적용*/
                    /*손자뻘 태그 (div->p->span)에는 적용 안된다.*/
            font-style: italic;
        }
    </style>
</head>
<body>
    <div>
        <span>html 재밌다!</span>
        <p>
            <span>javascrit도 재밌나?</span>
            <a >
                <span>jquery도 재밌을까?</span>
            </a>
        </p>
        <span>hmtl 재밌다 ㅋㅋ</span>
    </div>
</body>
</html>
