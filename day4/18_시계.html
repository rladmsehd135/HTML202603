<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document</title>

<style>
#container{
    width: 400px;
    height: auto;
}

#time{
    font-size: 5px;
    font-weight: bold;
    color: blue;
    text-align: center;
}
</style>

</head>

<body>

<div id="container">
    <div id="time"></div>
</div>

<script>
setInterval(()=>{
    let datetime = new Date()
    let obj = document.querySelector("#time");
    let second = datetime.getSeconds() < 10 ? "0" + datetime.getSeconds() : datetime.getSeconds();
    let time = datetime.getHours() + " : "
    + datetime.getMinutes() + " : "
    + second;
    obj.innerHTML = time;
},1000)
</script>

</body>
</html>
