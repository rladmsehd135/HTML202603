<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="fnAlert()">알림창</button>
    <button onclick="fnConfirm()"></button>확인창</button>
    <button onclick="fnGuGuDan()">구구단</button>
</body>
</html>
<script>
    //변수는 let, 상수는 const
    //리턴 타입 없음
    function fnAlert(){
        alert("안녕? \n 반가워");
    }

    function fnConfirm(){
        if(confirm("정말 삭제?")){
            alert("삭제 됨!");
        }else{
            alert("취소 됨");
        }
    }
    console.log("aaa");

    function fnGuGuDan(){
        for(let i=2; i<=9; i++){
                document.write(`<div style="color:red;">======${i}단=========</div>`)
            for(let j=1; j<=9; j++){
                document.write(`<div>${i} * ${j} = ${i*j} </div>`);
            }
        }
        document.write("<hr>");
    }
    
</script>
