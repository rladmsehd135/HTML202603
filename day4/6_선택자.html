<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,tr,th,td{
            border: 2px solid black;
            padding:  5px 10px;
            text-align: center;
            border-collapse: collapse;
        }
        tr:nth-child(2){ /*tr태그중에 2번째 요소만 적용*/
            color: blue;
        }
        /* 2n+1 odd 홀수번째 */
        /* 2n, even 짝수번째  */
        tr:nth-child(even){ 
            background-color: #ccc;
        }
        tr:first-child{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>이름</th>
            <th>자바</th>
            <th>오라클</th>
            <th>html</th>
        </tr>
        <tr>
            <td>홍길동</td>
            <td>90</td>
            <td>90</td>
            <td>80</td>
        </tr>
        <tr>
            <td>철수동</td>
            <td>70</td>
            <td>50</td>
            <td>20</td>
        </tr>
        <tr>
            <td>이길동</td>
            <td>80</td>
            <td>70</td>
            <td>70</td>
        </tr>
        <tr>
            <td>사길동</td>
            <td>30</td>
            <td>40</td>
            <td>70</td>
        </tr>
    </table>
</body>
</html>
