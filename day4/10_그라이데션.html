<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 600px;
            height: 400px;
        }
        .grad1{
            /* 원형 그라데이션 */
            background: radial-gradient(white, skyblue,blue);

        }
        .grad2{
            /* 원형 그라데이션 */
            background: blue;;
            background:radial-gradient(circle,white, skyblue,blue);
            
        }
        .grad3{
            /* 원형 그라데이션 */
            background: blue;;
            background:radial-gradient(circle at 20% 50%,white,blue);
            
        }
        .grad4{
            /* 원형 그라데이션 */
            background: blue;;
            background:radial-gradient(white,skyblue 20%,blue 60%);
            
        }
    </style>
</head>
<body>
    <div class="grad4"></div>
</body>
</html>
