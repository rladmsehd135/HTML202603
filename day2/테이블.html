<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        table,tr,th,td{
            border : 2px solid black; /* 2pc 크기의 검은색 선(solid)*/
            border-collapse: collapse; /* 겹친느 선을 하나로 */
            padding : 5px 20px; /*상호 5px 좌우 20px*/
            text-align: center; /*가운데 정렬*/
        }
    </style>
<body>
    <!-- td열을 관리 -->
    <table>
        <tr>
            <th>이름</th>
            <th>자바</th>
            <th>오라클</th>
            <th>HTML</th>
        </tr>
        <tr>
            <td>홍길동</td>
            <td>90</td>
            <td>85</td>
            <td>100</td>
        </tr>
        <tr>
            <td>김철수</td>
            <td>80</td>
            <td>95</td>
            <td>90</td>
        </tr>
    </table>
</body>
</html>
