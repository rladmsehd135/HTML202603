<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            
            text-decoration: none;
        }
        /* hover -> 마우스를 올렸을 때 동작 */
        /* hover는 다른 태그에서도 사용 가능*/
        /* a:hover{
            background-color: black;
            color:white;
        } */
        /* link -> 방문하지 않은 링크에 스타일 부여*/
        a:link{color : red;}
        /*visited -> 방문한 링크에 스타일 부여*/
        a:visited{color:green;}
        /*active- > 클릭하는 순간에 스타일 부여*/
        a:active{color:blue;}
        /*focus -> 포커스를 받을때 스타일 부여*/
        /* a:focus{color: purple;} */

    </style>
</head>
<body>
    <a href="https://www.naver.com">네이버</a>
</body>
</html>
