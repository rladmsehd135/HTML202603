<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: antiquewhite;
            color: red ;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
    
</head>
<body>
    <!-- css 적용 방법은 크게 3가지 -->
    <!-- 1. 확장.css 파일에 정의하고 html파일에서 참조(링크) 하는 방법 -->
    <!-- 프로젝트 단위에서 가장 많이 사용되는 방법 -->
    <!-- 화면 공통성을 부여하기 위해 사용된다. -->

    <!-- 2. head 태그안에 style 태그로 정의하는 방법 -->
    <!-- 재사용을 잘 하지 않거나, 개별단위로 작업할 떄 -->
    <!--css처음 학습하거나, 각 화면의 통일성이 굳이 필요 없을 떄  -->

    <!-- 3. 태그안에 직접 style속성을 부여하는 방법 -->
    <!-- 가장 쉽고 빠른 방법. 가독성이 많이 안좋음 -->
    <!-- 회사에서 남발하면 잔소리 들음 유지보수 힘들다-->

    <!-- 스타일이 적용되는 우선순위는 3->2->1 --> 
    <!-- .css에 td에 스타일 부여하고, head에서 td에 스타일 부여하고 -->
    <!-- td에 직접 스타일 부여하면 최종적으로 직접 스타일 부여한게 적용된다.-->

    <!-- 3번 방식 -->
    <div style="
        background-color: black; 
        color:white; 
        font-size: 20px;
        font-style: italic;">3번 <span style="color: blue;">방법!!</span>
    </div>
    <!-- 2번 방식 -->
    <!-- (1~2번 공통) 태그이름,id,class명등을 통해서 스타일 부여 -->
    <div>
        2번 방법_1
    </div>
    
</body>
</html>
