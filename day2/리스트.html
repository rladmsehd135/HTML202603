<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 목록화 할 떄 사용하는 태그 (ol,ul) -->
     <!-- ul태그는 순서가 없는 목록을 작성할 떄 -->
     <ul>
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ul>
    <hr>
    <!-- ol태그는 순서가 있는 목록을 작성할 떄 -->
    <ol>
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ol>
    <hr>
     <ol type="1" reversed>
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ol>
</body>
</html>
