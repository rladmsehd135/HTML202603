<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #e2ecf6;
         }
        #container {
            width: 800px;
            margin : 100px auto;
        }
        .border-box {
            width: 400px;
            height: 400px;
            perspective: 600px;
        }
        .box-parent{
            width: 100%;
            height: 100%;
            /* background-color: #e5b7b7; */
            background-image: url("poket1.png");
            background-size: contain;
            background-repeat: no-repeat;
            position : relative;
            /* animation */
            animation: rotateParent 4s linear infinite;
            
            /* transform-style: flat; 디폴트 */
            transform-style : preserve-3d;
            
            /* transition: transform 2s; */ /* hover */
        }
        .box-child{
            width : 100%;
            height : 100%;
            position: absolute;
            background-image: url("poket2.png");
            background-size: contain;
            background-repeat: no-repeat;
            /* left : 60px;
            top : 60px; */
            /* transform: translateZ(50px); */
            backface-visibility: hidden;
        }
        @keyframes rotateParent {
            0%{transform : rotateY(0deg);}
            100%{transform : rotateY(360deg);}
        }
        /* hover */
        /* .box-parent:hover {
            transform : rotateY(180deg)
        } */
    </style>
</head>
<body>
    <div id="container">
        <div class="border-box">
            <div class="box-parent">
                <div class="box-child"></div>
            </div>
        </div>
    </div>
</body>
</html>
