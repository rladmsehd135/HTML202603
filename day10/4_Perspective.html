<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #e2ecf6;
         }
        #container {
            width: 800px;
            margin : 100px auto;
        }
        .border-box {
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
        }
        .box{
            width: 100%;
            height: 100%;
            background-color: blue;
            color : white;
            text-align: center;
            line-height: 150px;
            border-radius: 10px;

            
        }

        @keyframes spin {
            0%{transform: rotateY(0deg);}
            100%{transform: rotateY(360deg);}
        }

        .perspective1 {
            perspective: none;
        }
        .perspective2 {
            /* 사용자와 모니터 사이의 거리 */
            perspective: 500px;
        }

        .perspective3 {
            perspective: 400px;
        }
        .perspective3 .box {
            transition: transform 1s ease; 
        }
        .perspective3:hover .box { 
            transform: rotateX(70deg); 
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="border-box perspective3">
            <div class="box"></div>
        </div>
        
        
    </div>
</body>
</html>
