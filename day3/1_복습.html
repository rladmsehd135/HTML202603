<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        table,tr,th,td{
            border : 2px solid black; /* 2pc 크기의 검은색 선(solid)*/
            border-collapse: collapse; /* 겹친느 선을 하나로 */
            padding : 5px 20px; /*상호 5px 좌우 20px*/
            text-align: center; /*가운데 정렬*/
        }
        span{
            color: green;
        }

        #txt1{
            font-weight: bold;
        }
        .txt2{
            background-color: bisque;
        }
        .txt2:hover{
            background-color: aqua;
        }
        
    </style>
</head>
<body>
    <!-- 리스트 -->
    <!-- ol,ul -->
     <!-- type 속성을 이용해서 원하는 순서를 정의할 수 있다. -->
    <ol type = "A">
        <li>자바</li>
        <li>오라클</li>
        <li>hmtl</li>
    </ol>
    <!--  -->
     <ul>
        <li>자바</li>

     </ul>
     <hr>

    <a href = "../day2/java.html"> <img src="../media/java_img.jpgs"> </a>

            <th>모집기간</th>

        </tr>

    <hr>
    <!-- css를 설정 대상 -->

</html>
