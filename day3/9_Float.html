<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            margin: 5px;
        }
        .green{
            background-color:  green; float: left;
        }
        .blue{
            background-color: blue; float: left;
        }
        .orange{
            background-color: orange; float: right;
        }
        .black{
            background-color: black; clear: both;
        }
        .line{
            background-color: red; height: 50px;
        }
    </style>
</head>
<body>
    <div class="box green"></div>
    <div class="box blue"></div>
    <div class="box orange"></div>
    <div class="line"></div>
    <div class="box black"></div>
</body>
</html>
