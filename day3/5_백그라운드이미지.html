<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid black;
            background-image: url("../media/2.jfif");
            background-size: contain; /*contain 이미지가 잘리지 않게최대한 비율을 유지해서 크게 맞춤*/
            /* 박스가 이미지보다 크면 빈공간이 생길 수 있다. */
        }
        .box1:hover{
            background-image: url("../media/3.jfif");
        }
    </style>
</head>
<body>
    <div class="box1"></div>
</body>
</html>
