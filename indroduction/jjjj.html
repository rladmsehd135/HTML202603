<script>

/* 시계 */

function clock(){

    const now = new Date();

    let h = now.getHours();
    let m = now.getMinutes();
    let s = now.getSeconds();

    if(h<10) h="0"+h;
    if(m<10) m="0"+m;
    if(s<10) s="0"+s;

    document.getElementById("time").innerHTML =
    h+":"+m+":"+s;

}

setInterval(clock,1000);

/* 타이핑 효과 */

        const text="성장하는 Backend Developer";
        let i=0;

        function typing(){

    if(i<text.length){

        document.getElementById("typing").innerHTML+=text.charAt(i);
        i++;

        setTimeout(typing,80);

    }

}

typing();

</script>
