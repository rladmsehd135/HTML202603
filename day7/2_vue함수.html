<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <!-- html. 반드시 id가 app인 태그 안에서 작업 -->
        <!-- (script 맨 하단 app.mount('#app'); 여기 아이디와 같아야 함) -->
        <div>
            {{name}}
        </div>
        <div>
            <button @click="fnChange()">클릭!</button>
         </div>
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                name : "홍길동",
                age : 30
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnChange : function () {
                // alert(this.name);
            
                if(this.name == "홍길동"){
                    this.name = "김철수";
                }else{
                    this.name = "홍길동";
                }
            },
            fnAlert : function(name){
                alert(name + "님 안녕하세요!");
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            this.fnAlert("홍길동");
        }
    });

    app.mount('#app');
</script>
