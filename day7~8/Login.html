<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#e9f0ff,#d6e4ff);
            
        }

        .container{
            width:350px;
            height: 500px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

     
        h1{
            margin-bottom:10px;
        }

      
        .sub{
            color:#8aa0c6;
            font-size:14px;
            margin-bottom:30px;
        }

       
        .input-box{
            margin-bottom:20px;
            text-align:left;
        }

        .input-box label{
            font-size:14px;
            font-weight:bold;
        }

        .input-box input{
            width:90%;
            padding:12px;
            margin-top:5px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:14px;
        }



      
        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:30px;
            background:linear-gradient(90deg,#5b7cff,#4a6cf7);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
        }

       
        button:hover{
            transform:scale(1.03);
            transition:0.2s;
            background:linear-gradient(90deg,#455ec2,#3952b6);
        }

       
        .bottom{
            margin-top:20px;
            font-size:13px;
            color:#8aa0c6;
        }

        .bottom a{
            
            color:#4a6cf7;
        }

    </style>
</head>
<body>
    <div id="app">
        <div class="container">

            <h1>환영합니다</h1>
            <div class="sub">서비스를 이용을 위해 로그인해주세요</div>

        

            <div class="input-box">
            <label>아이디</label>
            <input type="text" v-model="userId" placeholder="아이디를 입력하세요">
            </div>

            <div class="input-box">
            <label>비밀번호</label>
            <input @keyup.enter="fnLogin()" type="password" v-model="pwd" placeholder="비밀번호를 입력하세요">
            </div>

            <button class="btn" @click="fnLogin()">
                로그인
            </button>
    
            <a href="#">비밀번호 찾기</a> | <a href="../day7/Join.html">회원가입</a>
            </div>

        </div>
    </div>
</body>
</html>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : "",
                pwd : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnLogin: function () {
                let self = this;
                let param = {
                    userId : self.userId,
                    pwd : self.pwd
                };
                $.ajax({
                    url: "http://192.168.30.57:3009/login",
                    dataType: "json",
                    type: "GET",
                    data : param,
                    // data: {userId : self.userId, pwd : self.pwd},
                    success: function (data) {
                        console.log(data);
                        alert(data.message);
                        if(data.success){
                             location.href="Main.html";
                        }
                        
                    }
                });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
