<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        button{
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html. 반드시 id가 app인 태그 안에서 작업 -->
        <!-- (script 맨 하단 app.mount('#app'); 여기 아이디와 같아야 함) -->
        <div style="height: 30px;"><span v-if = "sum != ''">결과 : {{sum}}</span></div>
        <hr>
         숫자1 : <input v-model="num1"> 
         숫자2 : <input v-model="num2">
         
        <div>
            <button @click="fnsum">더하기</button>
            <button @click="fnClear">초기화</button>
        </div>
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                sum : "",
                num1 : "",
                num2 : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnsum: function () {
                let self = this;
                this.sum = parseInt(self.num1)+ Number(self.num2);
               
            },
            fuClear : function(){
                let self = this;
                self.sum= "";
                self.num1="";
                self.num2="";
            }        
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
