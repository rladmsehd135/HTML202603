<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫번째 실습!</title>
</head>
<body>
    <!-- pre태그는 작성한 그대로 출력되지만 -->
     <!-- 사용을 권장하진 않음. -->
    <pre>
        안녕하세요 반갑습니다. 
        html 재밌다!!   

    </pre>
    <hr>
    <!-- h태그 -->
     <!-- 글씨 크기가 크고, 볼드체. 따라서 제목에 많이 쓰임 -->
      <h1>HMTL</h1>
      <h2>HMTL</h2>
      <h3>HMTL</h3>
    <hr>
    <!-- div,span -->
    <!--div 태그는 한줄을 다 차지 한다(block 속성)  -->
    <!-- span 태그는 자기 크기만큼만 차지한다.(inline 속성)  -->
    <div>안녕하세요!</div>
    <div>오라클 재밌죠?</div>
    <span>안녕하세요</span>
    <span>오라클 노잼!!</span>

    <hr>
    <!-- b. strong -->
    <div>
        <strong>strong태그!</strong>
    </div>
    <br> <!-- 줄바꿈   -->
    <div>
        <b>b태그!</b>
    </div>
    <hr>
    <!-- i,em -->
    <div>
        <b>
            <i>i태그!</i>
        </b>
    </div>  
    <div>
        <em>em태그!</em>
    </div>
    <hr>
    <!-- mark 강조하는 태그, 다만 색이 정해져있어 css로 대체 하는게 좋다 -->
     <div>
        <mark>mark태그</mark>
    </div>
    <!-- css로 크기를 세분화 할 수 있다. -->
    <div>
        <small>small태그!</small>
    </div>   
    <div>
        <span style="font-size:20px;">css 글씨 크기 적용</span>
    </div>   
    <div>
        <div>
            HTML<sup> 재밌다!</sup> 
        </div>
    </div>
    <div>
        <div>
            HTML<sub> 재밌다!</sub> 
        </div>
    </div>
    <div>
        html<del>재밌다!</del>
    </div>
    
    <div>
        html<ins>재밌다!</ins>
    </div>

</body>
</html>
