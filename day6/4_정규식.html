<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id = "container">
        <div>
            <label>아이디 : <input type ="text" id ="userId"></label>
        </div>
        <div>
            <label>비밀번호 : <input type ="password" id ="pwd1"></label>
        </div>
        <div>
            <label>비밀번호확인 : <input type ="password" id ="pwd2"></label>
        </div>
        <div>
            <button onclick="fnjoin()">회원가입</button>
        </div>
    </div>
    
</body>
</html>
<script>
    function fnjoin(){
        let userId = document.querySelector("#userId").value;
        if(userId.length < 6){
            alert("아이디는 6글자 이상으로 하셈");
            return;
        }

        //1. 문자열이 소문자+숫자인지 검사
        const regex = /^[a-z0-9]+$/;
        // console.log(regex.test(userId));
        if(!regex.test(userId)){
            alert("아이디는 소문자+숫자");
            return;
        }

        // 1.패스워드는 8글자 이상
        //2. '패스워드', '패스워드 확인'
        //3. 패스워드에는 특수문자 필수
        let pwd1 = document.querySelector("#pwd1").value;
        let pwd2 = document.querySelector("#pwd2").value;
        if(pwd1.length < 8){
            alert("비밀번호는 8글자 이상으로 하셈");
            return;
        }
        const str = "!@#";
        const regex1 = /^[ ` ~ ! @ # $ % ^ & * | \\ ' " ; : \ / ? ]+$/gi;
        console.log(regex1.test(str)); // true

        if(regex1.test(pwd1)){
            alert("특수문자 필수!");
            return;
        }

        if(pwd1 === pwd2){
            alert("가입성공!");  
        }else{
            alert("비밀번호 불일치");
            return;
        }
        
    }
</script>
