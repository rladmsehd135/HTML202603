        // 인자2 : 팝업의 이름

        let top =(screen.availHeight-300) / 2;
        let left = (screen.availWidth-600) / 2;
        window.open(
            "../day4/18_시계.html" , 
            "time",
            `width=600, height=300,left=${left}, top=${top}`
        );
