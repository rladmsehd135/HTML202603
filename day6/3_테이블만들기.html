<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, th, tr, td{
            border : 1px solid black;
            padding : 5px 10px;
            text-align: center;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <div id="contents">
        
    </div>
    <div>
        <button onclick="fnCreateTable()">테이블 만들기</button>
    </div>
</body>
</html>
<script>
    function fnCreateTable(){
         // <table></table>
         // <tr></tr>
        // let column1 = document.createElement("td"); // <td></td>
        // column1.innerHTML = "1";
        // row.appendChild(column1); // <tr><td>1</td></tr>
        let table = document.createElement("table");
        for(let j=1; j<=5; j++){
            let row = document.createElement("tr");
            for(let i=1; i<=5; i++){
                let column = document.createElement("td"); // <td></td>
                column.innerHTML = i;
                row.appendChild(column);
            }
            table.appendChild(row);
        }
        let contents = document.querySelector("#contents");
        contents.appendChild(table);

    }
</script>
