<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 800px;
            display: grid;
            box-sizing: border-box;
            border: 2px solid black;
            /* auto-fit */
            /* 전체 크기에 맞춰서 요소들을 꽉 채움 */
            grid-template-columns: repeat(auto-fit,minmax(100px, 1fr));
            /* auto-fill */
            /* 최소 크기에 맞춰서 채움 빈공간 있으면 그대로 둔다  */
             /* grid-template-columns: repeat(auto-fill,minmax(100px,ifr)); */
            gap:10px 20px;
        }
        .box{
            border:1px solid black;
            padding: 5px 10px;
            text-align: center;
            font-size: 15px;

        }
        .box:nth-child(odd){ /*tr태그중에 2번째 요소만 적용*/
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>
</body>
</html>
