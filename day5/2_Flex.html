<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 2px solid black;
            background-color: #eee;
            display: flex;
        }
        .box{
            width: 100px;
            margin: 5px;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            text-align: center;
            justify-content: row;
        }
        .wrap1{
            /* 디폴트, 한줄에 표시 */
            flex-wrap:  wrap;
        }
        .wrap2{
            /* 여러줄에 표시 */
            flex-wrap:  wrap-reverse;
        }
        .wrap3{
            /* 한줄에 표시 */
            flex-wrap: nowrap;
        }
    </style>
</head>
<body>
     <div id="container" class="wrap1">
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">3</div>
        <div class = "box">4</div>
        <div class = "box">5</div>
     </div>
</body>
</html>
