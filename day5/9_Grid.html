<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 800px;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,100px);
           
        }
        .box{
            border:1px solid black;
            padding: 5px 10px;
            text-align: center;
            font-size: 15px;

        }
        .green-box{
            background-color: green;
            grid-column:  1/-1; 
            grid-row: 1/2;
        }
        .blue-box{
            background-color: blue;
            /* grid-row-start:4; */
            grid-row: 2/4;

        }
        .orange-box{
            background-color: orange;
            grid-column: 2/-1;
        }
        
    </style>
</head>
<body>
    <div id="container">
        <div class="box green-box">1</div>
        <div class="box blue-box">2</div>
        <div class="box orange-box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div> 
</body>
</html>
