<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            display: grid;
            grid-template-columns: 200px 300px 100px;
            /* grid-template-rows: 100px 200px; */
            grid-auto-rows: 100px;
        }
        .box{
            border:1px solid black;
            padding: 5px 10px;
            text-align: center;
            font-size: 15px;

        }
        .box:nth-child(odd){ /*tr태그중에 2번째 요소만 적용*/
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>
</body>
</html>
