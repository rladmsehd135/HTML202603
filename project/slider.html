<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.js"></script>

    <style>
        .swiper {
            width: 100%;
            /* wdith : 800px 등 원하는 크기 가능 */
        }
        /* 슬라이드 안의 이미지가 영역에 딱 맞게 들어가도록 설정 */
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- .swiper-container에서 .swiper로 변경 -->
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="banner1.png"></div>
                <div class="swiper-slide"><img src="banner2.png"></div>
                <div class="swiper-slide"><img src="banner3.png"></div>
                <div class="swiper-slide"><img src="banner4.png"></div>
                <div class="swiper-slide"><img src="banner5.png"></div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>
</body>

</html>

<script>
    const app = Vue.createApp({
        data() {
            return {};
        },
        methods: {
            fnInit: function() {
                const swiper = new Swiper('.swiper', {
                    loop: true,
                    autoplay: {
                        delay: 2500,
                    },
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                    },
                    navigation: {
                        nextEl: '.swiper-button-next',
                        prevEl: '.swiper-button-prev',
                    },
                });
            }
        }, 
        mounted() {
            this.fnInit();
        }
    });

    app.mount('#app');
</script>
